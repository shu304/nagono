<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約＋お通し管理</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  font-family:sans-serif;
  padding:15px;
  background:#f4f4f4;
  padding-bottom:110px;
}

h2{
  text-align:center;
  margin-bottom:15px;
}

select,input,button{
  width:100%;
  padding:14px;
  font-size:18px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  border:none;
}

.add-btn{
  background:#2c3e50;
  color:white;
}

.reset-btn{
  background:#c0392b;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:15px;
  font-size:16px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th{
  background:#333;
  color:white;
  font-size:14px;
}

.done{
  background:#d4edda;
}

.notyet{
  background:#ffe5e5;
}

.badge{
  padding:4px 6px;
  border-radius:6px;
  color:white;
  font-size:12px;
}

.c4500{background:#3498db;}
.c6500{background:#9b59b6;}
.c8500{background:#e67e22;}

.summary{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  padding:15px;
  box-shadow:0 -2px 6px rgba(0,0,0,0.15);
  font-weight:bold;
  text-align:center;
  font-size:18px;
}
</style>
</head>

<body>

<h2>予約入力</h2>

<select id="time"></select>

<select id="seat">
<option value="counter">カウンター</option>
<option value="table">テーブル</option>
</select>

<select id="people"></select>

<select id="course" disabled>
<option value="">コースなし</option>
<option value="4500">4500円</option>
<option value="6500">6500円</option>
<option value="8500">8500円</option>
</select>

<button class="add-btn" onclick="addData()">追加</button>
<button class="reset-btn" onclick="resetAll()">リセット</button>

<table>
<thead>
<tr>
<th>時間</th>
<th>席</th>
<th>人数</th>
<th>コース</th>
<th>お通し</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="summary">
合計 <span id="totalPeople">0</span>人　
コース <span id="courseTotal">0</span>人
</div>

<script>

let reservations = JSON.parse(localStorage.getItem("reservations")) || [];
let editIndex = null;


// ===== 時間生成 =====
const timeSelect = document.getElementById("time");

for(let h=17; h<=22; h++){
  for(let m=0; m<60; m+=15){

    const hh = String(h).padStart(2,'0');
    const mm = String(m).padStart(2,'0');

    const option = document.createElement("option");
    option.value = `${hh}:${mm}`;
    option.textContent = `${hh}:${mm}`;

    timeSelect.appendChild(option);

  }
}


// ===== 人数1〜30 =====
const peopleSelect = document.getElementById("people");

for(let i=1;i<=30;i++){

  const option = document.createElement("option");
  option.value = i;
  option.textContent = i+"人";

  peopleSelect.appendChild(option);

}


// ===== 人数変更 =====
peopleSelect.addEventListener("change",()=>{

  checkCourse();
  checkSeatRule();

});


// ===== コース制御 =====
function checkCourse(){

  const people = parseInt(peopleSelect.value);
  const courseSelect = document.getElementById("course");

  if(people > 2){

    courseSelect.disabled = false;

  }else{

    courseSelect.disabled = true;
    courseSelect.value = "";

  }

}


// ===== 席制御 =====
function checkSeatRule(){

  const people = parseInt(peopleSelect.value);
  const seatSelect = document.getElementById("seat");

  if(people >= 3){

    seatSelect.value="table";
    seatSelect.disabled=true;

  }else{

    seatSelect.disabled=false;

  }

}


// ===== 保存 =====
function saveData(){

  localStorage.setItem("reservations", JSON.stringify(reservations));

}


// ===== 追加 / 更新 =====
function addData(){

  const time = timeSelect.value;
  const seat = document.getElementById("seat").value;
  const people = Number(peopleSelect.value);
  const course = document.getElementById("course").value;

  if(editIndex === null){

    reservations.push({time, seat, people, course, otoshi:false});

  }else{

    reservations[editIndex] = {time, seat, people, course, otoshi:false};
    editIndex=null;

  }

  saveData();

  render();

}


// ===== お通し =====
function toggleOtoshi(i){

  reservations[i].otoshi = !reservations[i].otoshi;

  saveData();

  render();

}


// ===== リセット =====
function resetAll(){

  if(confirm("本当に全データ削除しますか？")){

    reservations=[];
    saveData();
    render();

  }

}


// ===== 長押し =====
let pressTimer;

function startPress(i){

  pressTimer = setTimeout(()=>{

    openMenu(i);

  },600);

}

function cancelPress(){

  clearTimeout(pressTimer);

}


// ===== 編集 / 削除 =====
function openMenu(i){

  const action = confirm("OK＝編集\nキャンセル＝削除");

  if(action){

    editData(i);

  }else{

    if(confirm("削除しますか？")){

      reservations.splice(i,1);
      saveData();
      render();

    }

  }

}


// ===== 編集 =====
function editData(i){

  const r = reservations[i];

  editIndex = i;

  timeSelect.value = r.time;
  document.getElementById("seat").value = r.seat;
  peopleSelect.value = r.people;
  document.getElementById("course").value = r.course;

  checkCourse();
  checkSeatRule();

}


// ===== 表描画 =====
function render(){

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML="";

  let total=0;
  let courseTotal=0;

  reservations.sort((a,b)=>a.time.localeCompare(b.time));

  reservations.forEach((r,i)=>{

    total+=r.people;

    if(r.course) courseTotal+=r.people;

    let badge="-";

    if(r.course){

      badge=`<span>${r.course}円</span>`;

    }

    tbody.innerHTML+=`

<tr class="${r.otoshi?'done':'notyet'}"
ontouchstart="startPress(${i})"
ontouchend="cancelPress()">

<td>${r.time}</td>
<td>${r.seat==="counter"?"C":"T"}</td>
<td>${r.people}</td>
<td>${badge}</td>

<td>
<button onclick="toggleOtoshi(${i})">
${r.otoshi?"✔":"未"}
</button>
</td>

</tr>

`;

  });

  document.getElementById("totalPeople").textContent=total;
  document.getElementById("courseTotal").textContent=courseTotal;

}

render();

</script>

</div>

</body>
</html>
